<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transnatur INC — Choose Your Path</title>
  <meta name="description" content="Drive with Transnatur INC. CDL-A drivers wanted. Competitive pay, modern fleet, home time. Apply now!">
  <meta name="keywords" content="CDL-A driver jobs, truck driver hiring, Transnatur INC, flatbed driver, Illinois trucking">
  <meta property="og:title" content="Drive With Transnatur INC — Apply Now">
  <meta property="og:description" content="Join our team. Competitive pay, modern Peterbilt fleet, great home time.">

  <!-- Google Analytics placeholder -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'GA_MEASUREMENT_ID');
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy:      #0B1F3A;
      --red:       #C62828;
      --red-hover: #A31515;
      --white:     #FFFFFF;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Video Background */
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Dark Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        rgba(11, 31, 58, 0.65),
        rgba(11, 31, 58, 0.82)
      );
      z-index: 0;
    }

    /* Centered Content */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 0 24px;
    }

    /* Logo */
    .logo {
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .logo img {
      height: 64px;
      width: auto;
    }

    /* Headline */
    .headline {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--white);
      text-transform: uppercase;
      line-height: 1.1;
      letter-spacing: 0.02em;
      max-width: 720px;
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    /* Subtext */
    .subtext {
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 400;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      color: rgba(255, 255, 255, 0.78);
      letter-spacing: 0.1em;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease 0.5s both;
    }

    /* Button */
    .buttons {
      animation: fadeUp 0.6s ease 0.7s both;
    }

    .btn-primary {
      display: inline-block;
      padding: 18px 56px;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      background: var(--red);
      color: var(--white);
      border: 2px solid var(--red);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      background: var(--red-hover);
      border-color: var(--red-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(198, 40, 40, 0.4);
    }

    /* Staggered Fade-Up Animation */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .logo img {
        height: 48px;
      }

      .headline {
        font-size: 2rem;
      }

      .btn-primary {
        width: 100%;
        text-align: center;
        padding: 18px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Video Background -->
  <div class="video-container">
    <video autoplay muted loop playsinline>
      <source src="vide_truck.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Dark Overlay -->
  <div class="overlay"></div>

  <!-- Centered Content -->
  <main class="content">

    <div class="logo">
      <img src="assets/logo-white.png" alt="Transnatur INC" />
    </div>

    <h1 class="headline">Built for the Road.<br>Trusted Nationwide.</h1>

    <p class="subtext">Choose your path to get started.</p>

    <div class="buttons">
      <a href="index.html" class="btn-primary">I'm a Driver</a>
    </div>

  </main>

</body>
</html>
